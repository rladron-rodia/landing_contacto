<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Monou.gg Contacts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: {
          brand: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e' },
          dark:  { 900: '#0B0E14', 800: '#151A23', 700: '#1f2937' },
        }
      }}
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Estado tags */
    .tag { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; }
    .tag-emailed  { background:#0d9488; color:#fff; }
    .tag-received { background:#3b82f6; color:#fff; }
    .tag-failed   { background:#dc2626; color:#fff; }
  </style>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">

  <!-- ───── Login ───── -->
  <div id="login-view" class="hidden min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-dark-800 border border-white/10 rounded-2xl p-8">
      <div class="flex items-center gap-3 mb-6">
        <i class="fa-solid fa-shield-halved text-brand-400 text-2xl"></i>
        <h1 class="text-2xl font-bold">Monou.gg · Admin</h1>
      </div>
      <p class="text-sm text-gray-400 mb-6">
        Pega tu <code class="bg-dark-900 px-1 py-0.5 rounded text-brand-400">ADMIN_TOKEN</code>
        (configurado en Render → Environment) para ver los contactos guardados.
      </p>
      <form id="login-form" class="space-y-4">
        <input id="token-input" type="password" autocomplete="off" required
               placeholder="Bearer token..."
               class="w-full bg-dark-900 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500">
        <button type="submit"
                class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg transition-colors">
          Entrar
        </button>
        <p id="login-error" class="hidden text-xs text-red-400 text-center"></p>
      </form>
    </div>
  </div>

  <!-- ───── App ───── -->
  <div id="app-view" class="hidden">
    <!-- Header -->
    <header class="sticky top-0 z-10 bg-dark-800/80 backdrop-blur border-b border-white/10">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-4">
        <i class="fa-solid fa-table-list text-brand-400 text-xl"></i>
        <h1 class="text-lg font-semibold">Contactos · Monou.gg</h1>
        <span id="count-badge" class="ml-2 text-xs bg-dark-900 px-2 py-1 rounded-full text-gray-400"></span>
        <div class="ml-auto flex items-center gap-3">
          <button id="refresh-btn" title="Refrescar"
                  class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-white/5">
            <i class="fa-solid fa-rotate"></i>
          </button>
          <button id="export-btn" title="Exportar CSV"
                  class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-white/5">
            <i class="fa-solid fa-file-csv"></i>
          </button>
          <button id="logout-btn" title="Salir"
                  class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-white/5">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>
      </div>
      <!-- Filtros -->
      <div class="max-w-7xl mx-auto px-6 pb-4 flex flex-wrap items-center gap-3">
        <input id="search-input" type="search" placeholder="Buscar por nombre, email o empresa…"
               class="flex-1 min-w-[240px] bg-dark-900 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-brand-500">
        <select id="status-filter"
                class="bg-dark-900 border border-white/10 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-brand-500">
          <option value="">Todos los estados</option>
          <option value="emailed">Emailed ✅</option>
          <option value="received">Received</option>
          <option value="failed">Failed ❌</option>
        </select>
      </div>
    </header>

    <!-- Tabla -->
    <main class="max-w-7xl mx-auto px-6 py-6">
      <div id="loading-state" class="text-center text-gray-400 py-12">
        <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
        <p class="mt-2 text-sm">Cargando contactos…</p>
      </div>

      <div id="empty-state" class="hidden text-center text-gray-500 py-16">
        <i class="fa-solid fa-inbox text-4xl mb-4"></i>
        <p>Aún no hay contactos.</p>
      </div>

      <div id="error-state" class="hidden text-center text-red-400 py-12">
        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
        <p id="error-message" class="text-sm"></p>
        <button id="retry-btn" class="mt-4 px-4 py-2 bg-brand-500 hover:bg-brand-600 rounded-lg text-sm">
          Reintentar
        </button>
      </div>

      <div id="table-wrapper" class="hidden overflow-x-auto bg-dark-800 border border-white/10 rounded-2xl">
        <table class="w-full text-sm">
          <thead class="bg-dark-700/50 text-xs uppercase text-gray-400">
            <tr>
              <th class="text-left px-4 py-3">#</th>
              <th class="text-left px-4 py-3">Fecha</th>
              <th class="text-left px-4 py-3">Nombre</th>
              <th class="text-left px-4 py-3">Email</th>
              <th class="text-left px-4 py-3">Empresa</th>
              <th class="text-left px-4 py-3">Caso de uso</th>
              <th class="text-left px-4 py-3">Estado</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-white/5"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ───── Modal detalle ───── -->
  <div id="detail-modal" class="hidden fixed inset-0 z-20 bg-black/70 flex items-center justify-center p-6">
    <div class="bg-dark-800 border border-white/10 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-white/10 flex items-center gap-3">
        <i class="fa-solid fa-id-card text-brand-400"></i>
        <h2 class="text-lg font-semibold">Detalle del contacto</h2>
        <button id="modal-close" class="ml-auto text-gray-400 hover:text-white">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      <div id="modal-body" class="p-6 space-y-4 text-sm"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
