<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fondo dark con gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0E14"/>
      <stop offset="100%" style="stop-color:#151A23"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="350" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="280" fill="url(#glow)" opacity="0.5"/>

  <!-- Badge superior -->
  <g transform="translate(80, 90)">
    <rect width="320" height="40" rx="20" fill="#151A23" stroke="#14b8a6" stroke-opacity="0.4"/>
    <circle cx="22" cy="20" r="5" fill="#14b8a6"/>
    <text x="40" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#2dd4bf">Dataset v2.0 · Now Available</text>
  </g>

  <!-- Título principal -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="white">
    Gameplay Datasets
  </text>
  <text x="80" y="295" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="url(#brand)">
    for AI &amp; World Models
  </text>

  <!-- Subtítulo -->
  <text x="80" y="365" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#9ca3af">
    Train AI agents with thousands of hours of captured,
  </text>
  <text x="80" y="395" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#9ca3af">
    curated and labeled gameplay data.
  </text>

  <!-- Métricas en cards -->
  <g transform="translate(80, 450)">
    <!-- Card 1: 10K+ -->
    <g>
      <rect width="200" height="120" rx="16" fill="#151A23" stroke="white" stroke-opacity="0.05"/>
      <text x="100" y="55" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle">10K+</text>
      <text x="100" y="85" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CAPTURE HOURS</text>
    </g>
    <!-- Card 2: 2.5M -->
    <g transform="translate(220, 0)">
      <rect width="200" height="120" rx="16" fill="#151A23" stroke="white" stroke-opacity="0.05"/>
      <text x="100" y="55" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#22d3ee" text-anchor="middle">2.5M</text>
      <text x="100" y="85" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="2">INDEXED VIDEOS</text>
    </g>
    <!-- Card 3: 50+ -->
    <g transform="translate(440, 0)">
      <rect width="200" height="120" rx="16" fill="#151A23" stroke="white" stroke-opacity="0.05"/>
      <text x="100" y="55" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#a78bfa" text-anchor="middle">50+</text>
      <text x="100" y="85" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="2">GAMES COVERED</text>
    </g>
  </g>

  <!-- Marca / logo abajo a la derecha -->
  <g transform="translate(960, 540)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="white">monoulabs</text>
    <text x="158" y="0" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#6b7280">.ai</text>
  </g>
</svg>
