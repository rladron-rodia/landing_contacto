databases:
  - name: landing-contacto-db
    plan: free
    databaseName: monou_contacts
    user: monou

services:
  - type: web
    name: landing-contacto-backend
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_MODE
        value: tls
      - key: SMTP_USER
        value: contacto@monou.gg
      - key: MAIL_FROM
        value: contacto@monou.gg
      - key: MAIL_TO
        value: rodrigo.ladron@monou.gg
      - key: ALLOWED_ORIGIN
        value: "*"
      # SMTP_PASSWORD: secret, se setea en el dashboard de Render
      - key: SMTP_PASSWORD
        sync: false
      # ADMIN_TOKEN: secret para listar contactos vía /api/contacts
      - key: ADMIN_TOKEN
        sync: false
      # Conexión a Postgres — Render inyecta el connection string aquí
      - key: DATABASE_URL
        fromDatabase:
          name: landing-contacto-db
          property: connectionString
