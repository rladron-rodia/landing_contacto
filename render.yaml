databases:
  - name: landing-contacto-db
    plan: free
    databaseName: monou_contacts
    user: monou

services:
  - type: web
    name: landing-contacto-backend
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # --- Email (Resend) ---
      # Sin dominio verificado: usa onboarding@resend.dev
      # Con monou.gg verificado: cambia a "Monou.gg <contacto@monou.gg>"
      - key: MAIL_FROM
        value: "Monou.gg Landing <onboarding@resend.dev>"
      # En plan free de Resend SIN dominio verificado, MAIL_TO debe ser
      # el email con el que registraste tu cuenta de Resend.
      - key: MAIL_TO
        value: rodrigo.ladron@gmail.com
      - key: ALLOWED_ORIGIN
        value: "*"
      # API key de Resend → secret en el dashboard de Render
      - key: RESEND_API_KEY
        sync: false
      # Token Bearer para listar contactos vía /api/contacts → secret
      - key: ADMIN_TOKEN
        sync: false
      # Postgres → Render lo inyecta automáticamente
      - key: DATABASE_URL
        fromDatabase:
          name: landing-contacto-db
          property: connectionString
